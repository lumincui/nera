name: NeraTouchpoint
options:
  bundleIdPrefix: app.nera
  deploymentTarget:
    iOS: "18.0"
packages:
  NeraCore:
    path: ../../packages/nera-core
targets:
  NeraTouchpoint:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - NeraTouchpointApp
    dependencies:
      - package: NeraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nera.touchpoint
        PRODUCT_NAME: NeraTouchpoint
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: 43TLL56HZX
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: NeraTouchpoint.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Nera
        INFOPLIST_KEY_NeraServerURL: "http://192.168.31.221:8787"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG NERA_DEV_FEATURES"
